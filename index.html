<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikJet - TikTok Downloader</title>
    
    <!-- PWA Connection -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b0f19;
        }
        .glass-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .gradient-text {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between">

    <!-- Header / Navbar -->
    <header class="w-full max-w-4xl mx-auto px-4 py-5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="icon.png" alt="TikJet Logo" class="w-10 h-10 rounded-xl shadow-lg border border-cyan-500/30">
            <span class="text-2xl font-bold tracking-wide gradient-text">TikJet</span>
        </div>
        
        <!-- Language Selector -->
        <select id="langSelect" onchange="changeLanguage()" class="bg-gray-800 text-sm text-gray-200 border border-gray-700 rounded-lg px-3 py-1.5 focus:outline-none focus:border-cyan-500 transition">
            <option value="badini">Badîny (کوردی)</option>
            <option value="sorani">Soranî (کوردی)</option>
            <option value="english">English</option>
        </select>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-4xl mx-auto px-4 py-8 flex flex-col items-center justify-center gap-8">
        
        <!-- Intro Section -->
        <div class="text-center space-y-3">
            <h1 id="mainTitle" class="text-3xl md:text-4xl font-extrabold tracking-tight">دابەزاندنا ڤیدیۆ و ستۆریێن تیکتۆکێ</h1>
            <p id="mainSubtitle" class="text-gray-400 text-sm md:text-base">بۆرد و لایەنێن ڤیدیۆیێ ب کوالیتییا دەستپێکی و بێ نیشان (Watermark)</p>
        </div>

        <!-- Input Box Section -->
        <div class="w-full glass-card rounded-2xl p-6 shadow-2xl space-y-4">
            <div class="relative flex items-center">
                <i class="fa-solid fa-link absolute right-4 text-gray-500 text-lg"></i>
                <input type="text" id="videoUrl" placeholder="لینکی ڤیدیۆیێ لڤێرە دابنێ..." class="w-full bg-gray-900/50 border border-gray-700/60 rounded-xl pr-12 pl-4 py-4 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-cyan-500/80 focus:ring-2 focus:ring-cyan-500/20 transition text-right dir-rtl">
            </div>
            
            <button onclick="processDownload()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-semibold py-4 rounded-xl shadow-lg shadow-cyan-500/20 transition-all transform active:scale-[0.99] flex items-center justify-center gap-2">
                <i class="fa-solid fa-cloud-arrow-down"></i>
                <span id="btnText">داونلۆدا بلەز</span>
            </button>
        </div>

        <!-- Result Section (Hidden initially) -->
        <div id="resultSection" class="w-full glass-card rounded-2xl p-6 shadow-2xl hidden space-y-6">
            <div class="flex flex-col md:flex-row gap-6 items-center">
                <img id="resultThumb" src="profile.jpg" alt="Thumbnail" class="w-32 h-32 md:w-40 md:h-40 rounded-xl object-cover border border-gray-700">
                <div class="flex-1 space-y-2 text-center md:text-right w-full">
                    <h3 id="resultAuthor" class="text-lg font-bold text-cyan-400">@username</h3>
                    <p id="resultDesc" class="text-gray-300 text-sm line-clamp-3">وەسفا ڤیدیۆیێ لڤێرە دیار دبیت...</p>
                </div>
            </div>
            
            <!-- Download Options Grid -->
            <div id="downloadOptions" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <!-- Links will dynamicly inject here -->
            </div>
        </div>

        <!-- History Section -->
        <div id="historySection" class="w-full glass-card rounded-2xl p-5 shadow-xl space-y-3">
            <div class="flex justify-between items-center border-b border-gray-800 pb-3">
                <button onclick="clearHistory()" class="text-xs text-red-400 hover:text-red-300 transition flex items-center gap-1">
                    <i class="fa-solid fa-trash"></i> <span id="clearHistText">پاککرنەوە</span>
                </button>
                <h2 id="historyTitle" class="text-base font-bold flex items-center gap-2 text-gray-300">
                    <i class="fa-solid fa-clock-rotate-left text-cyan-500"></i> مێژووا داونلۆدان
                </h2>
            </div>
            <ul id="historyList" class="space-y-2 max-h-40 overflow-y-auto pr-1">
                <!-- LocalStorage history items -->
            </ul>
        </div>

        <!-- Sponsor / Monetization Card -->
        <div class="w-full max-w-sm glass-card border border-amber-500/20 rounded-xl p-4 flex items-center justify-between text-sm shadow-lg shadow-amber-500/5">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-amber-500/10 flex items-center justify-center text-amber-400">
                    <i class="fa-solid fa-star"></i>
                </div>
                <div>
                    <p class="font-semibold text-gray-200">Sponsor: zano.b22</p>
                    <p class="text-xs text-gray-400">پشتگیرییا مە بکە</p>
                </div>
            </div>
            <a href="https://instagram.com/zano.b22" target="_blank" class="bg-amber-500 hover:bg-amber-400 text-gray-950 font-bold px-3 py-1.5 rounded-lg text-xs transition">فۆڵۆو بکە</a>
        </div>

    </main>

    <!-- Footer -->
    <footer class="w-full text-center py-6 border-t border-gray-900 text-xs text-gray-500">
        <p>&copy; 2026 TikJet Downloader. All rights reserved.</p>
    </footer>

    <!-- Logic / Script Section -->
    <script>
        // Localization System
        const langData = {
            badini: {
                title: "دابەزاندنا ڤیدیۆ و ستۆریێن تیکتۆکێ",
                subtitle: "بۆرد و لایەنێن ڤیدیۆیێ ب کوالیتییا دەستپێکی و بێ نیشان (Watermark)",
                placeholder: "لینکی ڤیدیۆیێ لڤێرە دابنێ...",
                btn: "داونلۆدا بلەز",
                history: "مێژووا داونلۆدان",
                clear: "پاککرنەوە",
                noHistory: "چ مێژوویەک نینە"
            },
            sorani: {
                title: "دابەزاندنی ڤیدیۆ و ستۆری تیکتۆک",
                subtitle: "دابەزاندنی ڤیدیۆکان بە کوالێتی ئەسڵی و بێ لۆگۆ",
                placeholder: "لینکی ڤیدیۆ لێرە دابنێ...",
                btn: "داونلۆدی خێرا",
                history: "مێژووی داونلۆدەکان",
                clear: "سڕینەوەی مێژوو",
                noHistory: "هیچ مێژوویەک نییە"
            },
            english: {
                title: "TikTok Video & Story Downloader",
                subtitle: "Download TikTok videos in original quality without watermark",
                placeholder: "Paste TikTok link here...",
                btn: "Fast Download",
                history: "Download History",
                clear: "Clear",
                noHistory: "No history found"
            }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelect').value;
            const data = langData[lang];
            
            document.getElementById('mainTitle').innerText = data.title;
            document.getElementById('mainSubtitle').innerText = data.subtitle;
            document.getElementById('videoUrl').placeholder = data.placeholder;
            document.getElementById('btnText').innerText = data.btn;
            document.getElementById('historyTitle').innerHTML = `<i class="fa-solid fa-clock-rotate-left text-cyan-500"></i> ${data.history}`;
            document.getElementById('clearHistText').innerText = data.clear;
            
            // Toggle text direction base on language
            const urlInput = document.getElementById('videoUrl');
            if(lang === 'english') {
                urlInput.className = "w-full bg-gray-900/50 border border-gray-700/60 rounded-xl pl-12 pr-4 py-4 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-cyan-500/80 focus:ring-2 focus:ring-cyan-500/20 transition text-left dir-ltr";
            } else {
                urlInput.className = "w-full bg-gray-900/50 border border-gray-700/60 rounded-xl pr-12 pl-4 py-4 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-cyan-500/80 focus:ring-2 focus:ring-cyan-500/20 transition text-right dir-rtl";
            }
            renderHistory();
        }

        // Processing Logic
        function processDownload() {
            const url = document.getElementById('videoUrl').value.trim();
            if(!url) return alert('Please enter a valid link!');
            
            // UI Loading state
            document.getElementById('btnText').innerText = "... Loading";
            
            // Simulated API Request (Replace with your actual downloader API endpoint)
            setTimeout(() => {
                document.getElementById('btnText').innerText = langData[document.getElementById('langSelect').value].btn;
                
                // Show mock response data safely
                document.getElementById('resultSection').classList.remove('hidden');
                document.getElementById('resultAuthor').innerText = "@tikjet_user";
                document.getElementById('resultDesc').innerText = "Downloaded via TikJet App Context 2026";
                
                const optionsGrid = document.getElementById('downloadOptions');
                optionsGrid.innerHTML = `
                    <button onclick="forceDownload('#', 'video')" class="bg-gray-800 hover:bg-gray-700 p-3 rounded-xl flex items-center justify-between text-sm transition border border-gray-700"><span class="text-cyan-400">HD Video</span><i class="fa-solid fa-video"></i></button>
                    <button onclick="forceDownload('#', 'audio')" class="bg-gray-800 hover:bg-gray-700 p-3 rounded-xl flex items-center justify-between text-sm transition border border-gray-700"><span class="text-emerald-400">Audio MP3</span><i class="fa-solid fa-music"></i></button>
                `;
                
                saveToHistory(url);
            }, 1200);
        }

        function forceDownload(url, type) {
            console.log(`Downloading resource ${type} from: ${url}`);
            // Force browser trigger download sequence
        }

        // LocalStorage History Management
        function saveToHistory(url) {
            let history = JSON.parse(localStorage.getItem('tikjet_history')) || [];
            if(!history.includes(url)) {
                history.unshift(url);
                if(history.length > 10) history.pop(); // Keep top 10 items
                localStorage.setItem('tikjet_history', JSON.stringify(history));
                renderHistory();
            }
        }

        function renderHistory() {
            const historyList = document.getElementById('historyList');
            const currentLang = document.getElementById('langSelect').value;
            let history = JSON.parse(localStorage.getItem('tikjet_history')) || [];
            
            if(history.length === 0) {
                historyList.innerHTML = `<li class="text-xs text-gray-500 text-center py-2">${langData[currentLang].noHistory}</li>`;
                return;
            }
            
            historyList.innerHTML = history.map(url => `
                <li class="bg-gray-950/40 border border-gray-800/60 rounded-lg p-2.5 flex items-center justify-between text-xs transition hover:border-gray-700">
                    <a href="${url}" target="_blank" class="text-gray-400 hover:text-cyan-400 truncate max-w-[80%] dir-ltr text-left">${url}</a>
                    <i class="fa-solid fa-chevron-left text-gray-600"></i>
                </li>
            `).join('');
        }

        function clearHistory() {
            localStorage.removeItem('tikjet_history');
            renderHistory();
        }

        // Initialize Screen Assets
        window.onload = () => {
            renderHistory();
        };

        // Service Worker Installation Hook
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker Registered!'))
                    .catch(err => console.log('Service Worker Registration Failed:', err));
            });
        }
    </script>
</body>
</html>
