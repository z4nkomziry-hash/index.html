<!DOCTYPE html>
<html lang="ku-center" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="0yVhPW7nNi1E1fOA29q-2PWpxBxSPzX-snPXMxI4NsM" />
    <title>TIKJET | باشترین دابەزێنەرێ تیکتۆک</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;600;800&family=Noto+Kufi+Arabic:wght=300;500;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Noto Kufi Arabic', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px rgba(255, 255, 255, 0.08) solid; }
        .dir-ltr { direction: ltr; text-align: left; }
        .dir-rtl { direction: rtl; text-align: right; }
        @keyframes float { 0% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-10px) scale(1.02); } 100% { transform: translateY(0px) scale(1); } }
        .animated-logo { animation: float 4s ease-in-out infinite; }
        .neon-glow-text { text-shadow: 0 0 12px rgba(236, 72, 153, 0.6), 0 0 25px rgba(124, 58, 237, 0.4); }
    </style>
    <script src="https://pl29886983.effectivecpmnetwork.com/d3/93/40/d3934077e9523de11fad986c4fc273e4.js"></script>
</head>
<body class="text-slate-100 min-h-screen flex flex-col justify-between antialiased selection:bg-pink-500 selection:text-white">

    <header class="container mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3 animated-logo">
            <div class="bg-gradient-to-tr from-pink-500 to-violet-600 p-2.5 rounded-2xl shadow-lg shadow-pink-500/20"><i class="fa-brands fa-tiktok text-xl text-white"></i></div>
            <span class="text-xl font-extrabold tracking-wide neon-glow-text">TIK<span class="text-pink-500">JET</span></span>
        </div>
        <div class="relative inline-block text-left z-50">
            <select id="langSelect" onchange="changeLanguage(this.value)" class="bg-slate-900 border border-slate-700 text-slate-200 text-sm rounded-xl px-3 py-2 pr-8 focus:outline-none focus:border-pink-500 cursor-pointer appearance-none shadow-lg">
                <option value="badini">☀️ کوردی (بەهدینی)</option>
                <option value="sorani">☀️ کوردی (سورانی)</option>
                <option value="ar">🇸🇦 العربية</option>
                <option value="en-us">🇺🇸 English (US)</option>
            </select>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-3xl my-auto py-6">
        <div class="w-full max-w-xl mx-auto mb-6 p-3 bg-slate-900/60 backdrop-blur rounded-2xl border border-pink-500/30 flex items-center justify-between gap-4 shadow-xl">
            <div class="flex items-center gap-3">
                <span class="bg-gradient-to-r from-pink-500 to-violet-600 text-white text-[10px] px-2 py-0.5 rounded-md font-extrabold tracking-wide uppercase">AD</span>
                <p id="adTxtText" class="text-xs text-slate-300 font-medium">جهێ ڕیکلاما تە لڤێرە بەتاڵە!</p>
            </div>
            <a href="https://t.me/z_14x" target="_blank" class="text-xs bg-gradient-to-r from-pink-500 to-violet-600 text-white px-4 py-2 rounded-xl font-bold whitespace-nowrap shadow-md">Contact ✉️</a>
        </div>

        <div class="text-center mb-6">
            <h1 id="mainTitle" class="text-3xl md:text-5xl font-extrabold mb-3 tracking-tight">دابەزاندنا ڤیدیۆ و ستۆریێن تیکتۆکێ بێ لۆگۆ</h1>
            <p id="mainSubtitle" class="text-slate-400 text-sm md:text-base font-medium max-w-md mx-auto">لینکی دانێ، کلیک بکە، و د چەند چرکەکا دا ب بەرزترین کوالێتی دابەزینە.</p>
        </div>

        <div class="glass-card p-4 md:p-6 rounded-3xl shadow-2xl mb-6">
            <div class="flex gap-2 p-1 bg-slate-950/60 rounded-xl mb-4 border border-slate-800/80 max-w-xs mx-auto">
                <button onclick="switchDownloadMode('link')" id="modeLink" class="flex-1 text-xs font-bold py-2 rounded-lg bg-pink-500 text-white shadow">URL Link</button>
                <button onclick="switchDownloadMode('username')" id="modeUsername" class="flex-1 text-xs font-bold py-2 rounded-lg text-slate-400 hover:text-white">Username</button>
            </div>

            <div class="flex flex-col md:flex-row gap-3">
                <div class="relative flex-1">
                    <input type="text" id="tiktokUrl" placeholder="لینکی ڤیدیۆیێ لڤێرە دانێ..." class="w-full bg-slate-950/60 border border-slate-800 rounded-2xl py-4 pl-4 pr-24 text-white text-left dir-ltr">
                    <button onclick="pasteLink()" id="btnPaste" class="absolute right-3 top-1/2 -translate-y-1/2 bg-slate-800 text-slate-300 text-xs font-bold px-3 py-2 rounded-xl">Paste</button>
                </div>
                <button onclick="downloadVideo()" id="btnDownload" class="bg-gradient-to-r from-pink-500 to-violet-600 text-white font-bold px-8 py-4 rounded-2xl shadow-lg whitespace-nowrap"><span id="txtDownloadBtn">دابەزینە</span></button>
            </div>
            <div id="errorMessage" class="hidden mt-4 text-rose-400 text-sm text-center font-medium bg-rose-500/10 py-2.5 rounded-xl"></div>
        </div>

        <div id="userResultsSection" class="hidden glass-card p-6 rounded-3xl shadow-2xl mb-6">
            <h4 id="userResultTitle" class="text-sm font-bold text-slate-400 mb-4">ئەنجامێن هژمارێ:</h4>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-4" id="userMediaGrid"></div>
        </div>

        <div id="resultCard" class="hidden glass-card p-6 rounded-3xl shadow-2xl mb-6">
            <div id="resultFlex" class="flex flex-col md:flex-row gap-6 items-center">
                <div class="relative w-full md:w-48 aspect-[9/16] rounded-2xl overflow-hidden bg-slate-950 flex items-center justify-center">
                    <img id="videoCover" src="" alt="Cover" class="absolute inset-0 w-full h-full object-cover opacity-60">
                </div>
                <div class="flex-1 w-full flex flex-col justify-between py-2 text-center md:text-right" id="resultTextSection">
                    <div>
                        <h3 id="authorName" class="text-xl font-bold text-white mb-1"></h3>
                        <p id="videoDesc" class="text-slate-400 text-sm line-clamp-3 mb-4"></p>
                    </div>
                    <div class="flex flex-col gap-3">
                        <div class="grid grid-cols-2 gap-2">
                            <button id="downloadBtnNoWm" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 px-4 rounded-xl text-sm">Download</button>
                            <button id="viewBtnDirect" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3.5 px-4 rounded-xl text-sm">View (تەماشەکرن)</button>
                        </div>
                        <button id="downloadBtnMusic" class="w-full bg-slate-800 text-slate-200 font-semibold py-3 px-6 rounded-xl text-sm">MP3 (دەنگ)</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="container mx-auto px-4 py-6 text-center text-xs text-slate-500 font-medium">&copy; 2026 TIKJET. All rights reserved.</footer>

    <script>
        const languages = {
            badini: { title: "دابەزاندنا ڤیدیۆ و ستۆریێن تیکتۆکێ بێ لۆگۆ", subtitle: "لینکی دانێ، کلیک بکە، و د چەند چرکەکا دا ب بەرزترین کوالێتی دابەزینە.", placeholderLink: "لینکی ڤیدیۆیێ لڤێرە دانێ...", placeholderUser: "ناڤێ حسابێ بنڤیسە...", paste: "پێوەکە", download: "دابەزینە", noWm: "Download", viewVideo: "View (تەماشەکرن)", music: "MP3 (دەنگ)", userResultsTitle: "ئەنجامێن هژمارێ:", dir: "rtl" },
            sorani: { title: "داگرتنی ڤیدیۆ و ستۆری تیکتۆک بێ لۆگۆ", subtitle: "لینکی دابنێ، کلیک بکە، و لە چەند چرکەیەکدا بە بەرزترین کوالێتی دایبەزێنە.", placeholderLink: "لینکی ڤیدیۆکە لێرە دابنێ...", placeholderUser: "ناوی حیسابەکە بنووسە...", paste: "پەیست", download: "دایبگرە", noWm: "Download", viewVideo: "View (تەماشاكردن)", music: "MP3 (دەنگ)", userResultsTitle: "ئەنجامەکانی حیساب:", dir: "rtl" },
            ar: { title: "تحميل فيديوهات وستوري تيك توك بدون علامة مائية", subtitle: "ضع الرابط، اضغط تحميل، واحصل على الفيديو بأعلى جودة.", placeholderLink: "أدخل رابط تيك توك هنا...", placeholderUser: "أدخل اسم المستخدم...", paste: "لصق", download: "تحميل", noWm: "Download", viewVideo: "View (معاينة)", music: "MP3 (صوت)", userResultsTitle: "نتائج الحساب:", dir: "rtl" },
            "en-us": { title: "Download TikTok Videos Without Watermark", subtitle: "Paste the link, click download, and grab your video instantly.", placeholderLink: "Paste TikTok link here...", placeholderUser: "Enter username...", paste: "Paste", download: "Download", noWm: "Download", viewVideo: "View Video", music: "MP3 Audio", userResultsTitle: "Account Results:", dir: "ltr" }
        };

        let currentLang = localStorage.getItem('tikjet_lang') || 'badini';
        let currentMode = 'link'; let cachedVideoUrl = ""; let cachedMusicUrl = "";

        function changeLanguage(lang) {
            currentLang = lang; localStorage.setItem('tikjet_lang', lang); const l = languages[lang];
            document.getElementById('mainTitle').innerText = l.title; document.getElementById('mainSubtitle').innerText = l.subtitle;
            document.getElementById('tiktokUrl').placeholder = (currentMode === 'link') ? l.placeholderLink : l.placeholderUser;
            document.getElementById('btnPaste').innerText = l.paste; document.getElementById('txtDownloadBtn').innerText = l.download;
            document.getElementById('downloadBtnNoWm').innerText = l.noWm; document.getElementById('viewBtnDirect').innerText = l.viewVideo;
            document.getElementById('downloadBtnMusic').innerText = l.music; document.getElementById('userResultTitle').innerText = l.userResultsTitle;
            document.body.setAttribute('dir', l.dir);
        }

        function switchDownloadMode(mode) {
            currentMode = mode; const l = languages[currentLang];
            document.getElementById('modeLink').className = mode === 'link' ? "flex-1 text-xs font-bold py-2 rounded-lg bg-pink-500 text-white shadow" : "flex-1 text-xs font-bold py-2 rounded-lg text-slate-400";
            document.getElementById('modeUsername').className = mode === 'username' ? "flex-1 text-xs font-bold py-2 rounded-lg bg-pink-500 text-white shadow" : "flex-1 text-xs font-bold py-2 rounded-lg text-slate-400";
            document.getElementById('tiktokUrl').placeholder = mode === 'link' ? l.placeholderLink : l.placeholderUser;
        }

        async function pasteLink() { const text = await navigator.clipboard.readText(); document.getElementById('tiktokUrl').value = text; }

        async function downloadVideo() {
            let urlInput = document.getElementById('tiktokUrl').value.trim();
            if (!urlInput) return;
            document.getElementById('txtDownloadBtn').innerText = "...";
            if (currentMode === 'username' && urlInput.startsWith('@')) urlInput = urlInput.substring(1);

            try {
                let apiUrl = currentMode === 'link' ? `https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput)}` : `https://www.tikwm.com/api/user/posts?unique_id=${encodeURIComponent(urlInput)}`;
                const response = await fetch(apiUrl); const data = await response.json();

                if (data.code === 0 && data.data) {
                    if (currentMode === 'link') {
                        document.getElementById('authorName').innerText = data.data.author.nickname;
                        document.getElementById('videoDesc').innerText = data.data.title || 'TikTok Video';
                        document.getElementById('videoCover').src = data.data.cover;
                        cachedVideoUrl = data.data.play; cachedMusicUrl = data.data.music;
                        document.getElementById('resultCard').classList.remove('hidden');
                    } else {
                        const posts = data.data.videos || data.data; const grid = document.getElementById('userMediaGrid'); grid.innerHTML = "";
                        posts.slice(0, 6).forEach(post => {
                            const card = document.createElement('div'); card.className = "relative aspect-[9/16] rounded-xl overflow-hidden bg-slate-950 p-2 flex flex-col justify-end gap-1";
                            card.innerHTML = `<img src="${post.cover}" class="absolute inset-0 w-full h-full object-cover opacity-60"><button onclick="triggerBlobDownload('${post.play}', 'video.mp4')" class="relative z-10 bg-emerald-500 text-white text-[10px] py-1 rounded">Down</button><button onclick="window.open('${post.play}', '_blank')" class="relative z-10 bg-blue-500 text-white text-[10px] py-1 rounded">View</button>`;
                            grid.appendChild(card);
                        });
                        document.getElementById('userResultsSection').classList.remove('hidden');
                    }
                }
            } catch (e) { alert("Error!"); }
            document.getElementById('txtDownloadBtn').innerText = languages[currentLang].download;
        }

        async function triggerBlobDownload(fileUrl, defaultName) {
            const response = await fetch(fileUrl); const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob); const a = document.createElement('a');
            a.href = blobUrl; a.download = defaultName; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        document.getElementById('downloadBtnNoWm').addEventListener('click', () => triggerBlobDownload(cachedVideoUrl, 'video.mp4'));
        document.getElementById('viewBtnDirect').addEventListener('click', () => window.open(cachedVideoUrl, '_blank'));
        document.getElementById('downloadBtnMusic').addEventListener('click', () => triggerBlobDownload(cachedMusicUrl, 'audio.mp3'));

        changeLanguage(currentLang);
    </script>
</body>
</html>
