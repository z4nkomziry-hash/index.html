            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            font-weight: 600;
            border-radius: 16px;
            transition: all 0.3s;

                errorFetch: "Liên kết không hợp lệ hoặc video ở chế độ riêng tư!",
                loading: "Đang tìm...", dir: "ltr", textAlign: "left"
            },
            th: {
                title: "ดาวน์โหลดวิดีโอและสตอรี่ TikTok แบบไม่มีลายน้ำ",
                subtitle: "วางลิงก์ คลิกดาวน์โหลด และรับวิดีโอของคุณด้วยความละเอียดสูงสุดทันที",
                placeholder: "วางลิงก์ TikTok ที่นี่...",
                paste: "วาง",
                download: "ดาวน์โหลด",
                noWm: "ดาวน์โหลดแบบไม่มีลายน้ำ (HD)",
                music: "ดาวน์โหลดเสียง (MP3)",
                errorEmpty: "กรุณาวางลิงก์ TikTok ที่ถูกต้องก่อน!",
                errorFetch: "ลิงก์ไม่ถูกต้องหรือวิดีโอเป็นส่วนตัว!",
                loading: "กำลังค้นหา...", dir: "ltr", textAlign: "left"
            }
        };

        let currentLang = 'badini';

        function changeLanguage(lang) {
            currentLang = lang;
            const l = languages[lang];
            
            document.getElementById('mainTitle').innerText = l.title;
            document.getElementById('mainSubtitle').innerText = l.subtitle;
            document.getElementById('tiktokUrl').placeholder = l.placeholder;
            document.getElementById('txtPasteBtn').innerText = l.paste;
            document.getElementById('txtDownloadBtn').innerText = l.download;
            document.getElementById('txtNoWatermark').innerText = l.noWm;
            document.getElementById('txtMusic').innerText = l.music;

            const body = document.body;
            const resFlex = document.getElementById('resultFlex');
            const resText = document.getElementById('resultTextSection');

            if(l.dir === "rtl") {
                body.classList.remove('dir-ltr'); body.classList.add('dir-rtl');
                body.setAttribute('dir', 'rtl');
                resFlex.classList.remove('md:flex-row-reverse');
                resText.classList.remove('md:text-left'); resText.classList.add('md:text-right');
            } else {
                body.classList.remove('dir-rtl'); body.classList.add('dir-ltr');
                body.setAttribute('dir', 'ltr');
                resFlex.classList.add('md:flex-row-reverse');
                resText.classList.remove('md:text-right'); resText.classList.add('md:text-left');
            }
        }

        async function pasteLink() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('tiktokUrl').value = text;
            } catch (err) {
                alert("Please allow clipboard permission to paste or use Ctrl+V/Long Press.");
            }
        }

        async function downloadVideo() {
            const urlInput = document.getElementById('tiktokUrl').value.trim();
            const btnDownload = document.getElementById('btnDownload');
            const errorMessage = document.getElementById('errorMessage');
            const resultCard = document.getElementById('resultCard');
            const l = languages[currentLang];

            errorMessage.classList.add('hidden');
            resultCard.classList.add('hidden');

            if (!urlInput) {
                showError(l.errorEmpty);
                return;
            }

            btnDownload.disabled = true;
            document.getElementById('txtDownloadBtn').innerText = l.loading;

            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();

                if (data.code === 0 && data.data) {
                    const videoData = data.data;
                    document.getElementById('videoCover').src = videoData.cover;
                    document.getElementById('authorName').innerText = videoData.author.nickname || `@${videoData.author.unique_id}`;
                    document.getElementById('videoDesc').innerText = videoData.title || 'TikTok Video';
                    
                    document.getElementById('downloadNoWatermark').href = videoData.play;
                    document.getElementById('downloadMusic').href = videoData.music;

                    resultCard.classList.remove('hidden');
                } else {
                    showError(l.errorFetch);
                }
            } catch (error) {
                showError("Error connecting to server. Try again.");
            } finally {
                btnDownload.disabled = false;
                document.getElementById('txtDownloadBtn').innerText = l.download;
            }
        }

        function showError(msg) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.innerText = msg;
            errorMessage.classList.remove('hidden');
        }

        changeLanguage('badini');
    </script>
</body>
</html>
