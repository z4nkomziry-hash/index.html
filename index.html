<!DOCTYPE html>
<html lang="ku-center" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIKJET | باشترین دابەزێنەرێ تیکتۆک</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Noto+Kufi+Arabic:wght@300;500;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', 'Noto Kufi Arabic', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px rgba(255, 255, 255, 0.08) solid;
        }
        .dir-ltr { direction: ltr; }
        .dir-rtl { direction: rtl; }
        .ad-placeholder {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            font-weight: 600;
            border-radius: 16px;
            transition: all 0.3s;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col justify-between antialiased selection:bg-pink-500 selection:text-white">

    <header class="container mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-tr from-pink-500 to-violet-600 p-2.5 rounded-2xl shadow-lg shadow-pink-500/20">
                <i class="fa-brands fa-tiktok text-xl text-white"></i>
            </div>
            <span class="text-xl font-extrabold tracking-wide">TIK<span class="text-pink-500">JET</span></span>
        </div>

        <div class="relative inline-block text-left z-50">
            <select id="langSelect" onchange="changeLanguage(this.value)" class="bg-slate-900 border border-slate-700 text-slate-200 text-sm rounded-xl px-3 py-2 pr-8 focus:outline-none focus:border-pink-500 cursor-pointer appearance-none shadow-lg">
                <option value="badini">☀️ کوردی (بەهدینی) ١٠٠٪</option>
                <option value="sorani">☀️ کوردی (سورانی) ١٠٠٪</option>
                <option value="ar">🇸🇦 العربية</option>
                <option value="en-us">🇺🇸 English (US)</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-400">
                <i class="fa-solid fa-chevron-down text-xs"></i>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-3xl my-auto py-6">
        <div class="text-center mb-6">
            <h1 id="mainTitle" class="text-3xl md:text-5xl font-extrabold mb-3 tracking-tight leading-tight">
                دابەزاندنا ڤیدیۆ و ستۆریێن تیکتۆکێ بێ لۆگۆ
            </h1>
            <p id="mainSubtitle" class="text-slate-400 text-sm md:text-base font-medium max-w-md mx-auto">
                لینکی دانێ، کلیک بکە، و د چەند چرکەکا دا ب بەرزترین کوالێتی دابەزینە.
            </p>
        </div>

        <div class="ad-placeholder w-full h-20 mb-6" id="adTop">
            <span>جهێ ڕیکلامێ (Top Ad 728x90)</span>
        </div>

        <div class="glass-card p-4 md:p-6 rounded-3xl shadow-2xl shadow-black/40 mb-6 transition-all duration-300">
            <div class="flex flex-col md:flex-row gap-3">
                <div class="relative flex-1">
                    <i class="fa-solid fa-link absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-lg"></i>
                    <input type="text" id="tiktokUrl" placeholder="لینکی ڤیدیۆیێ لڤێرە دانێ..." 
                        class="w-full bg-slate-950/60 border border-slate-800 rounded-2xl py-4 pl-12 pr-24 text-white placeholder-slate-500 focus:outline-none focus:border-pink-500 text-left dir-ltr transition-all">
                    
                    <button onclick="pasteLink()" id="btnPaste" class="absolute right-3 top-1/2 -translate-y-1/2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold px-3 py-2 rounded-xl transition flex items-center gap-1 cursor-pointer">
                        <i class="fa-solid fa-paste"></i> <span id="txtPasteBtn">Paste</span>
                    </button>
                </div>
                
                <button onclick="downloadVideo()" id="btnDownload" class="bg-gradient-to-r from-pink-500 to-violet-600 hover:from-pink-600 hover:to-violet-700 text-white font-bold px-8 py-4 rounded-2xl shadow-lg shadow-pink-500/20 transition flex items-center justify-center gap-2 whitespace-nowrap cursor-pointer">
                    <span id="txtDownloadBtn">دابەزینە</span>
                    <i class="fa-solid fa-arrow-down"></i>
                </button>
            </div>
            
            <div id="errorMessage" class="hidden mt-4 text-rose-400 text-sm text-center font-medium bg-rose-500/10 py-2.5 rounded-xl border border-rose-500/20"></div>
        </div>

        <div class="ad-placeholder w-full h-24 mb-6" id="adMiddle">
            <span>جهێ ڕیکلامێ (Middle Ad 728x90)</span>
        </div>

        <div id="resultCard" class="hidden glass-card p-6 rounded-3xl shadow-2xl transition-all duration-500 mb-6">
            <div id="resultFlex" class="flex flex-col md:flex-row gap-6 items-center">
                <div class="relative w-full md:w-48 aspect-[9/16] rounded-2xl overflow-hidden shadow-xl bg-slate-950 flex items-center justify-center">
                    <img id="videoCover" src="" alt="Cover" class="absolute inset-0 w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent"></div>
                    <i class="fa-solid fa-circle-play text-white/80 text-4xl relative z-10"></i>
                </div>
                
                <div class="flex-1 w-full flex flex-col justify-between py-2 text-center md:text-right" id="resultTextSection">
                    <div>
                        <h3 id="authorName" class="text-xl font-bold text-white mb-1"></h3>
                        <p id="videoDesc" class="text-slate-400 text-sm line-clamp-3 mb-4"></p>
                    </div>
                    
                    <div class="flex flex-col gap-3">
                        <button id="downloadBtnNoWm" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg transition flex items-center justify-center gap-2 cursor-pointer">
                            <i class="fa-solid fa-cloud-arrow-down"></i>
                            <span id="txtNoWatermark">دابەزاندن ب بێ لۆگۆ</span>
                        </button>
                        <button id="downloadBtnMusic" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-200 font-semibold py-3 px-6 rounded-xl transition flex items-center justify-center gap-2 text-sm cursor-pointer">
                            <i class="fa-solid fa-music"></i>
                            <span id="txtMusic">دابەزاندنا دەنگی (MP3)</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="ad-placeholder w-full h-20 mt-2" id="adBottom">
            <span>جهێ ڕیکلامێ (Bottom Ad 728x90)</span>
        </div>
    </main>

    <footer class="container mx-auto px-4 py-6 text-center text-xs text-slate-500 font-medium">
        &copy; 2026 TIKJET. All rights reserved.
    </footer>

    <script>
        const languages = {
            badini: {
                title: "دابەزاندنا ڤیدیۆ و ستۆریێن تیکتۆکێ بێ لۆگۆ",
                subtitle: "لینکی دانێ، کلیک بکە، و د چەند چرکەکا دا ب بەرزترین کوالێتی دابەزینە.",
                placeholder: "لینکی ڤیدیۆیێ لڤێرە دانێ...",
                paste: "پێوەکە",
                download: "دابەزینە",
                noWm: "دابەزاندن ب بێ لۆگۆ",
                music: "دابەزاندنا دەنگی (MP3)",
                errorEmpty: "هیڤییە ل پێشدا لینکەکێ تیکتۆکێ یێ ڕاست دانی!",
                errorFetch: "چ کێشە د لینکێ تە دا هەیە یان ڤیدیۆ یا تایبەتە!",
                loading: "لێگەریان...", dir: "rtl", textAlign: "right"
            },
            sorani: {
                title: "داگرتنی ڤیدیۆ و ستۆری تیکتۆک بێ لۆگۆ",
                subtitle: "لینکی دابنێ، کلیک بکە، و لە چەند چرکەیەکدا بە بەرزترین کوالێتی دایبگرە.",
                placeholder: "لینکی ڤیدیۆکە لێرە دابنێ...",
                paste: "پەیست",
                download: "دایبگرە",
                noWm: "داگرتن بێ لۆگۆ",
                music: "داگرتنی دەنگ (MP3)",
                errorEmpty: "تکایە سەرەتا لینکێکی تیکتۆکی ڕاست دابنێ!",
                errorFetch: "کێشەیەک لە لینکەکەدا هەیە یاخود ڤیدیۆکە تایبەتە!",
                loading: "گەڕان...", dir: "rtl", textAlign: "right"
            },
            ar: {
                title: "تحميل فيديوهات وستوري تيك توك بدون علامة مائية",
                subtitle: "ضع الرابط، اضغط تحميل، واحصل على الفيديو بأعلى جودة في ثوانٍ.",
                placeholder: "أدخل رابط تيك توك هنا...",
                paste: "لصق",
                download: "تحميل",
                noWm: "تحميل بدون علامة مائية",
                music: "تحميل الصوت (MP3)",
                errorEmpty: "يرجى إدخال رابط تيك توك صحيح أولاً!",
                errorFetch: "هناك خطأ في الرابط أو أن الفيديو خاص!",
                loading: "جاري البحث...", dir: "rtl", textAlign: "right"
            },
            "en-us": {
                title: "Download TikTok Videos & Stories Without Watermark",
                subtitle: "Paste the link, click download, and grab your video in highest quality instantly.",
                placeholder: "Paste TikTok link here...",
                paste: "Paste",
                download: "Download",
                noWm: "Download No Watermark",
                music: "Download Audio (MP3)",
                errorEmpty: "Please paste a valid TikTok link first!",
                errorFetch: "Invalid link or the video is private!",
                loading: "Searching...", dir: "ltr", textAlign: "left"
            }
        };

        let currentLang = 'badini';
        let cachedVideoUrl = "";
        let cachedMusicUrl = "";

        function changeLanguage(lang) {
            currentLang = lang;
            const l = languages[lang];
            
            document.getElementById('mainTitle').innerText = l.title;
            document.getElementById('mainSubtitle').innerText = l.subtitle;
            document.getElementById('tiktokUrl').placeholder = l.placeholder;
            document.getElementById('txtPasteBtn').innerText = l.paste;
            document.getElementById('txtDownloadBtn').innerText = l.download;
            document.getElementById('txtNoWatermark').innerText = l.noWm;
            document.getElementById('txtMusic').innerText = l.music;

            const body = document.body;
            const resFlex = document.getElementById('resultFlex');
            const resText = document.getElementById('resultTextSection');

            if(l.dir === "rtl") {
                body.className = "text-slate-100 min-h-screen flex flex-col justify-between antialiased selection:bg-pink-500 selection:text-white dir-rtl";
                body.setAttribute('dir', 'rtl');
                resFlex.classList.remove('md:flex-row-reverse');
                resText.classList.remove('md:text-left'); resText.classList.add('md:text-right');
            } else {
                body.className = "text-slate-100 min-h-screen flex flex-col justify-between antialiased selection:bg-pink-500 selection:text-white dir-ltr";
                body.setAttribute('dir', 'ltr');
                resFlex.classList.add('md:flex-row-reverse');
                resText.classList.remove('md:text-right'); resText.classList.add('md:text-left');
            }
        }

        async function pasteLink() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('tiktokUrl').value = text;
            } catch (err) {
                alert("Please allow clipboard permission to paste.");
            }
        }

        async function downloadVideo() {
            const urlInput = document.getElementById('tiktokUrl').value.trim();
            const btnDownload = document.getElementById('btnDownload');
            const errorMessage = document.getElementById('errorMessage');
            const resultCard = document.getElementById('resultCard');
            const l = languages[currentLang];

            errorMessage.classList.add('hidden');
            resultCard.classList.add('hidden');

            if (!urlInput) {
                showError(l.errorEmpty);
                return;
            }

            btnDownload.disabled = true;
            document.getElementById('txtDownloadBtn').innerText = l.loading;

            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();

                if (data.code === 0 && data.data) {
                    const videoData = data.data;
                    document.getElementById('videoCover').src = videoData.cover;
                    document.getElementById('authorName').innerText = videoData.author.nickname || `@${videoData.author.unique_id}`;
                    document.getElementById('videoDesc').innerText = videoData.title || 'TikTok Video';
                    
                    // Cache the clean URLs internally to prevent any external routing redirects
                    cachedVideoUrl = videoData.play;
                    cachedMusicUrl = videoData.music;

                    resultCard.classList.remove('hidden');
                } else {
                    showError(l.errorFetch);
                }
            } catch (error) {
                showError("Error connecting to server.");
            } finally {
                btnDownload.disabled = false;
                document.getElementById('txtDownloadBtn').innerText = l.download;
            }
        }

        // Native internal downloader block without escaping to external sites
        async function triggerBlobDownload(fileUrl, defaultName) {
            try {
                const response = await fetch(fileUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = defaultName;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
            } catch (e) {
                // Fallback direct open if fetch blob gets blocked by browser policy
                window.open(fileUrl, '_blank');
            }
        }

        document.getElementById('downloadBtnNoWm').addEventListener('click', () => {
            if(cachedVideoUrl) triggerBlobDownload(cachedVideoUrl, 'tikjet_video.mp4');
        });

        document.getElementById('downloadBtnMusic').addEventListener('click', () => {
            if(cachedMusicUrl) triggerBlobDownload(cachedMusicUrl, 'tikjet_audio.mp3');
        });

        function showError(msg) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.innerText = msg;
            errorMessage.classList.remove('hidden');
        }

        changeLanguage('badini');
    </script>
</body>
</html>
